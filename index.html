<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KriptoDrop MiniApp</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }

.nav, .tabs {
  display:flex;
  justify-content:space-around;
  background:#111827;
  padding:10px;
}

.tab, .nav-btn {
  cursor:pointer;
  opacity:0.5;
}

.active {
  opacity:1;
  color:#22c55e;
}

.coin-row {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #1f2937;
}

.coin-info {
  display:flex;
  gap:10px;
  align-items:center;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('market')">Market</div>
  <div class="tab" onclick="switchTab('top')">Top</div>
  <div class="tab" onclick="switchTab('calendar')">Takvim</div>
</div>

<div id="content"></div>

<div class="nav">
  <div class="nav-btn active" onclick="switchTab('market')">🏠</div>
  <div class="nav-btn" onclick="switchTab('top')">🔥</div>
  <div class="nav-btn" onclick="switchTab('calendar')">📅</div>
</div>

<script>
const BINANCE = "https://api.binance.com/api/v3/ticker/24hr";
const COINGECKO = "https://api.coingecko.com/api/v3";

let currentTab = "market";

function proxy(url){
  return `/api/proxy?url=${encodeURIComponent(url)}`;
}

function setActive(tab){
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');
    if(t.innerText.toLowerCase().includes(tab)) t.classList.add('active');
  });

  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.remove('active');
    if(b.getAttribute('onclick').includes(tab)) b.classList.add('active');
  });
}

function switchTab(tab){
  if(currentTab === tab) return;
  currentTab = tab;
  setActive(tab);

  if(tab === "market") loadMarket();
  if(tab === "top") loadTop();
  if(tab === "calendar") loadCalendar();
}

async function loadMarket(){
  document.getElementById("content").innerHTML = "Loading...";

  const data = await fetch(proxy(BINANCE)).then(r=>r.json());

  const list = data
    .filter(c => c.symbol.endsWith("USDT"))
    .slice(0,50);

  renderCoins(list);
}

async function loadTop(){
  document.getElementById("content").innerHTML = "Loading...";

  const binance = await fetch(proxy(BINANCE)).then(r=>r.json());

  const cg = await fetch(proxy(
    COINGECKO + "/coins/markets?vs_currency=usd&per_page=100"
  )).then(r=>r.json());

  const cgMap = {};
  cg.forEach(c=>{
    cgMap[c.symbol.toUpperCase()] = {
      name: c.name,
      img: c.image
    };
  });

  const list = binance
    .filter(c => c.symbol.endsWith("USDT"))
    .sort((a,b)=>b.priceChangePercent - a.priceChangePercent)
    .slice(0,50);

  renderCoins(list, cgMap);
}

function renderCoins(list, cgMap = {}){
  const html = list.map((c,i)=>{
    const base = c.symbol.replace("USDT","");
    const coin = cgMap[base] || {};

    return `
    <div class="coin-row">
      <div class="coin-info">
        <span>${i+1}</span>
        <img src="${coin.img || ''}" width="20">
        <div>
          <div>${coin.name || base}</div>
          <div>${c.symbol}</div>
        </div>
      </div>
      <div style="color:${c.priceChangePercent>0?'#22c55e':'#ef4444'}">
        ${parseFloat(c.priceChangePercent).toFixed(2)}%
      </div>
    </div>
    `;
  }).join("");

  document.getElementById("content").innerHTML = html;
}

function loadCalendar(){
  document.getElementById("content").innerHTML = `
    <div style="padding:20px">
      📅 Yakında eklenecek (Coin event API bağlanabilir)
    </div>
  `;
}

// init
loadMarket();
</script>

</body>
</html>

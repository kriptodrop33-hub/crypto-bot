<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KriptoDropTR Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --green: #00e676; --red: #ff1744; --accent: #238636;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
  .header { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; font-weight: bold; color: var(--green); }
  .page { display: none; padding: 15px; }
  .page.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .navbar { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; }
  .nb { color: var(--muted); text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .nb.active { color: var(--green); }
  .cico { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
</style>
</head>
<body>

<div class="header">KriptoDropTR Mini App</div>

<div id="p-home" class="page active"><div class="card">Yükleniyor...</div></div>
<div id="p-market" class="page"><div class="card">Piyasalar Yükleniyor...</div></div>
<div id="p-kar" class="page"><div class="card">Kar/Zarar Hesaplayıcı</div></div>
<div id="p-alarms" class="page"><div class="card">Alarmlarım</div></div>
<div id="p-calendar" class="page"><div class="card">Ekonomik Takvim</div></div>

<div class="navbar">
  <div class="nb active" onclick="setPage('home')">🏠<span>Ana Sayfa</span></div>
  <div class="nb" onclick="setPage('market')">📊<span>Market</span></div>
  <div class="nb" onclick="setPage('kar')">💰<span>Kar/Zarar</span></div>
  <div class="nb" onclick="setPage('alarms')">⏰<span>Alarmlar</span></div>
  <div class="nb" onclick="setPage('calendar')">📅<span>Takvim</span></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  // SORUN 1 ÇÖZÜMÜ: Coin Sembolleri
  function cIco(s){
    const sym = s.toLowerCase().replace('usdt','');
    return `<img src="https://bin.bnbstatic.com/static/images/crypto/${sym}.png" 
            onerror="this.src='https://bin.bnbstatic.com/static/images/common/favicon.ico'" 
            class="cico">`;
  }

  // SORUN 2 ÇÖZÜMÜ: Menülerin Seçili Kalması
  function setPage(pid){
    // Önce tüm sayfaları ve butonları temizle
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
    
    // Tıklananı aktif yap
    const targetPage = document.getElementById('p-' + pid);
    if(targetPage) targetPage.classList.add('active');
    
    const targetBtn = document.querySelector(`.nb[onclick*="setPage('${pid}')"]`);
    if(targetBtn) targetBtn.classList.add('active');
  }

  // Örnek veri yükleme (Piyasa)
  async function loadMarket() {
    const el = document.getElementById('p-market');
    // Burada sizin mevcut fetch kodlarınız yer alacak
  }
</script>
</body>
</html>
